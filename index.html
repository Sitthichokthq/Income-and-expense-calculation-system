<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=add" />
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Mymonny</title>
</head>
<body>
    <nav id="navbar"></nav>
    <!-- You can open the modal using ID.showModal() method -->

<dialog id="my_modal_3" class="modal">
  <div class="modal-box">
    <form method="dialog">
      <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
    </form>
    <h3 class="text-lg font-bold">Add New Entry</h3>
    <p class="py-4">Press ESC key or click on ✕ button to close</p>
    <form id="add-form" action="" class="flex flex-col gap-4">
    <label class="floating-label">
        <input type="text" placeholder="Use For" class="input input-md w-full " id="userfor" required/>
        <span>Use For</span>
    </label>
    <label class="floating-label">
        <input type="number" placeholder="Revenue" class="input input-md w-full " id="revenue" required/>
        <span>Revenue</span>
    </label>
    <label class="floating-label">
        <input type="number" placeholder="Expense" class="input input-md w-full " id="expense" required/>
        <span>Expense</span>
    </label>
    <label class="floating-label">
        <input type="date" placeholder="Date" class="input input-md w-full " id="date" required/>
        <span>Date</span>
    </label>
    <button class="btn btn-soft btn-primary w-full" type="submit">Save</button>
    </form>
  </div>
</dialog>

<div id="banneralert" class="fixed top-4 right-4 z-50"></div>

<!--Home-->
<div id="view-home" class="view-section block p-4 md:p-6">
        <h2 class="text-2xl font-bold mb-4">Home</h2>
   <table id="table" class="table"></table>
</div>


<!--Data Analytics-->
<div id="view-data" class="view-section hidden p-4 md:p-6">
    <h2 class="text-2xl font-bold mb-4">Data Analytics</h2>
    <div class="card bg-base-100 shadow-sm p-6">
        <div id="chatpage" class="w-full h-104">
  <canvas id="summaryChart" class="p-2 item-center"></canvas>
</div>
 </div>
</div>




<div class="dock">
  <button class="dock-active">
    <span class="material-symbols-outlined">home</span>
    <span class="dock-label">Home</span>
  </button>
  
  <button >
    <span class="material-symbols-outlined">stacked_line_chart</span>
    <span class="dock-label">Data</span>
  </button>
  
</div>





    <!--compros-->
    <script type="module" src="app/navbar/main.js"></script>
    <script type="module" src="app/table/main.js"></script>
    <script type="module" src="app/add/main.js"></script>
    <script type="module" src="app/dock/main.js"></script>
    <script type="module" src="app/chart/main.js"></script>
</body>
</html>
